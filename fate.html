    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');
        :root {
            --bg: #0c0816; --card: #141028; --border: #2a1e42;
            --gold: #b89ce0; --gold-dim: #7a64a0; --teal: #c084fc; --teal-dim: #8b5cf6;
            --cream: #e8dcc8; --glow-gold: rgba(184,156,224,0.12); --glow-teal: rgba(192,132,252,0.1);
        }
        body { background: var(--bg); color: var(--cream); font-family: 'Noto Serif SC','SimSun',serif; min-height:100vh; display:flex; justify-content:center; align-items:center; overflow-x:hidden; }
        body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse at 30% 20%, rgba(184,156,224,0.04) 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, rgba(192,132,252,0.03) 0%, transparent 50%); pointer-events:none; z-index:0; }
        .container { position:relative; z-index:1; width:100%; max-width:720px; padding:20px; }
        .panel { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:40px 36px; box-shadow:0 8px 50px rgba(0,0,0,0.7); transition:all .3s; position:relative; overflow:hidden; min-height:420px; }
        .panel::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold),var(--teal),transparent); opacity:0.3; }
        .start-screen { text-align:center; padding:20px 0; }
        .start-screen .deck-icon { font-size:44px; display:block; margin-bottom:10px; }
        .start-screen .logo { font-size:48px; font-weight:900; letter-spacing:6px; background:linear-gradient(180deg,var(--cream) 0%,var(--gold) 50%,var(--teal) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1.2; }
        .start-screen .logo-sub { font-size:13px; letter-spacing:4px; color:var(--gold-dim); margin-top:4px; font-weight:400; }
        .start-screen .subtitle { margin-top:22px; font-size:16px; color:var(--cream); opacity:.75; line-height:1.8; }
        .start-screen .tarot-line { margin-top:18px; font-size:13px; color:var(--teal-dim); letter-spacing:2px; opacity:.6; }
        .btn { display:inline-block; padding:14px 48px; border:1px solid var(--gold); background:transparent; color:var(--gold); font-family:inherit; font-size:16px; letter-spacing:3px; cursor:pointer; border-radius:4px; transition:all .3s; margin-top:24px; }
        .btn:hover { background:var(--gold); color:var(--bg); box-shadow:0 0 30px var(--glow-gold); }
        .btn:active { transform:scale(.97); }
        .btn-sm { padding:10px 28px; font-size:13px; margin:4px; }
        .btn-teal { border-color:var(--teal); color:var(--teal); }
        .btn-teal:hover { background:var(--teal); color:var(--bg); box-shadow:0 0 30px var(--glow-teal); }
        .quiz-screen { display:none; }
        .progress-wrap { display:flex; align-items:center; gap:12px; margin-bottom:28px; }
        .progress-bar { flex:1; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
        .progress-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--gold),var(--teal)); transition:width .5s ease; border-radius:2px; }
        .progress-text { font-size:13px; color:var(--gold-dim); white-space:nowrap; min-width:48px; text-align:right; }
        .q-tag { font-size:12px; color:var(--teal-dim); letter-spacing:2px; margin-bottom:6px; }
        .q-text { font-size:19px; font-weight:700; line-height:1.6; margin-bottom:24px; min-height:2.4em; }
        .options { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
        .option { display:block; width:100%; padding:14px 20px; border:1px solid var(--border); border-radius:8px; background:rgba(255,255,255,.015); color:var(--cream); font-family:inherit; font-size:18px; text-align:center; cursor:pointer; transition:all .25s; line-height:1.5; letter-spacing:3px; }
        .option:hover { border-color:var(--gold); background:rgba(184,156,224,.06); }
        .option:active { transform:scale(.99); }
        .option.selected { border-color:var(--teal); background:rgba(192,132,252,.08); box-shadow:0 0 20px rgba(192,132,252,.05); }
        .result-screen { display:none; }
        .result-header { text-align:center; margin-bottom:24px; }
        .result-badge { display:inline-block; font-size:11px; letter-spacing:2px; padding:4px 14px; border:1px solid var(--gold-dim); border-radius:12px; color:var(--gold-dim); margin-bottom:8px; }
        .result-char-icon { font-size:48px; display:block; margin-bottom:6px; }
        .result-name { font-size:32px; font-weight:900; line-height:1.3; }
        .result-name .highlight { color:var(--gold); }
        .result-code { font-size:15px; color:var(--teal); letter-spacing:4px; margin-top:4px; }
        .result-char { font-size:14px; color:var(--gold-dim); margin-top:4px; }
        .result-quote { margin:16px auto 0; max-width:480px; font-size:16px; font-style:italic; color:var(--teal); opacity:.8; line-height:1.6; padding:12px 20px; border-left:2px solid var(--teal-dim); text-align:left; }
        .result-desc { font-size:14px; line-height:1.9; color:var(--cream); opacity:.8; margin:20px 0; padding:0 4px; }
        .card-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:20px 0; }
        .info-card { border:1px solid var(--border); border-radius:10px; padding:16px; background:rgba(255,255,255,.01); }
        .info-card .card-label { font-size:11px; color:var(--gold-dim); letter-spacing:2px; margin-bottom:6px; }
        .info-card .card-body { font-size:13px; line-height:1.7; color:var(--cream); opacity:.8; }
        .info-card .tag-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
        .info-card .tag { font-size:11px; padding:3px 10px; border:1px solid var(--border); border-radius:10px; color:var(--teal); letter-spacing:1px; }
        .method-card { border:1px solid var(--border); border-radius:10px; padding:16px 20px; background:rgba(184,156,224,.03); margin:16px 0; }
        .method-card .card-label { font-size:11px; color:var(--gold-dim); letter-spacing:2px; margin-bottom:6px; }
        .method-card .card-body { font-size:14px; line-height:1.7; color:var(--cream); opacity:.8; font-style:italic; }
        .chart-wrap { margin:24px 0 16px; text-align:center; }
        .chart-wrap canvas { max-width:100%; }
        .chart-title { font-size:12px; color:var(--gold-dim); letter-spacing:3px; margin-bottom:12px; }
        .ranking-wrap { margin:16px 0; }
        .rank-item { display:flex; align-items:center; gap:10px; padding:6px 0; border-bottom:1px solid rgba(255,255,255,.03); }
        .rank-pos { font-size:11px; color:var(--gold-dim); min-width:18px; text-align:right; }
        .rank-name { font-size:13px; min-width:60px; }
        .rank-bar-wrap { flex:1; height:8px; background:rgba(255,255,255,.04); border-radius:4px; overflow:hidden; }
        .rank-bar { height:100%; border-radius:4px; transition:width .8s ease; }
        .rank-bar.gold { background:linear-gradient(90deg,var(--gold-dim),var(--gold)); }
        .rank-bar.teal { background:linear-gradient(90deg,var(--teal-dim),var(--teal)); }
        .rank-bar.gray { background:linear-gradient(90deg,transparent,rgba(255,255,255,.08)); }
        .rank-score { font-size:11px; color:var(--gold-dim); min-width:24px; text-align:right; }
        .result-actions { text-align:center; margin-top:28px; display:flex; flex-wrap:wrap; justify-content:center; gap:8px; }
        .footer-text { text-align:center; font-size:11px; color:var(--border); letter-spacing:2px; margin-top:16px; }
        .fade-in { animation:fadeIn .4s ease both; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        @media (max-width:560px) { .panel{padding:28px 16px} .start-screen .logo{font-size:32px} .q-text{font-size:17px} .card-grid{grid-template-columns:1fr} .result-name{font-size:26px} .btn{padding:12px 32px} }
    </style>
</head>

<script>
const TYPES = {
FOOL:{name:"愚者",code:"FOOL",char:"克莱恩·莫雷蒂",icon:"🎩",quote:"「我只是一个平平无奇的普通人。」",desc:"你表面温和、低调、不善言辞，但内心深处有着极强的责任感和守护欲。你习惯在行动之前反复权衡，不轻易显露真实实力。你是一个被动的主动者——看似随波逐流，实则每一步都在计划之中。你擅长伪装自己，把底牌藏到最后一刻。",strengths:["谨慎周密","善于伪装","责任感强","守护者","深藏不露"],weaknesses:["过度多疑","容易自我怀疑","总是过度操劳"],method:"你习惯用「我只是个普通人」来掩饰自己的不凡。你总是在别人低估你的时候悄悄完成布局，等他们反应过来时，一切已成定局。",vibe:["🎭 神秘","🛡️ 守护","🎲 伪装","🌊 深藏"]},
ERRO:{name:"错误",code:"ERRO",char:"阿蒙",icon:"🧐",quote:"「有趣，真有趣。」",desc:"你享受混乱和意外，喜欢看别人措手不及的样子。你的思维跳跃而狡黠，总能在规则中找到别人看不见的漏洞。你从不以恶意行事——你的驱动力是「有趣」。如果一件事不够有趣，你甚至懒得抬一下眼皮。",strengths:["思维敏捷","漏洞洞察力","临场应变","幽默感","创造力"],weaknesses:["缺乏耐心","不守规矩","有时过于恶趣味"],method:"你用「我只是觉得有趣」来合理化一切行为。",vibe:["🎪 狡黠","🎭 混乱","🍿 看戏","✨ 恶趣味"]},
ATOM:{name:"空想家",code:"ATOM",char:"亚当",icon:"📖",quote:"「一切都在计划之中。」",desc:"你是天生的战略家，习惯从全局视角审视一切。你理性、冷静、目标明确，几乎从不为情绪所左右。你的每一步都经过深思熟虑，仿佛在下一盘很大的棋。",strengths:["远见卓识","理性冷静","谋划周详","意志坚定","全局视角"],weaknesses:["感情淡漠","难以理解他人情绪","过于理想化"],method:"你用温和的态度掩盖绝对的理性。你说话总是客客气气的，但每一个字都在为你的长远目标服务。",vibe:["♟️ 谋略","🌐 全局","🧊 理性","👁️ 洞察"]},
EMPR:{name:"黄帝",code:"EMPR",char:"罗塞尔·古斯塔夫",icon:"👑",quote:"「我来过，我看见，我记录。」",desc:"你才华横溢，在各个领域都能展现惊人的天赋。你是一个天生的开拓者，不满足于走前人走过的路。你浪漫而自信，喜欢创造、留下印记、改变世界。",strengths:["才华横溢","开拓创新","自信心强","魅力四射","多才多艺"],weaknesses:["容易自负","喜新厌旧","耐性不足"],method:"你用才华来掩饰自己的野心。你总是说「只是随便做做」，但你心里清楚——你想要的是改变世界。",vibe:["🌟 才华","🚀 开拓","📜 传奇","💫 魅力"]},
EVEN:{name:"黑夜",code:"EVEN",char:"黑夜女神",icon:"🌙",quote:"「在黑暗之中，万物归于沉寂。」",desc:"你沉静而神秘，话不多但每一句都很有分量。你不喜欢成为焦点，习惯在暗处观察一切。你的存在本身就有一种令人安心的力量。",strengths:["沉着冷静","神秘深邃","洞察力强","守护者","隐忍"],weaknesses:["过于内敛","不善表达情感","有时过于消极"],method:"你用沉默来掩盖内心的波澜。你不说话的时候，别人以为你什么都不知道——其实你知道一切，只是选择不说破。",vibe:["🌙 沉静","🔮 神秘","🕯️ 守护","🌌 深邃"]},
TYRN:{name:"暴君",code:"TYRN",char:"风暴之主",icon:"⚡",quote:"「雷霆万钧，不过如此。」",desc:"你性格强势、雷厉风行，最讨厌拖泥带水。你相信力量能解决大部分问题，不屑于弯弯绕绕的计谋。你为人直接坦率，让人信赖。",strengths:["果断决绝","行动力强","坦率真诚","领袖气质","勇往直前"],weaknesses:["冲动易怒","缺乏耐心","不够细腻"],method:"你相信拳头能解决的问题都不是问题。阳谋才是你的风格。",vibe:["⚡ 雷霆","💪 力量","🔥 果断","🗡️ 直率"]},
REDA:{name:"红天使",code:"REDA",char:"梅迪奇",icon:"🔥",quote:"「战！」",desc:"你桀骜不驯，骨子里透着一股不服输的劲头。你好战、好胜，享受挑战和战斗的过程。你高傲但不傲慢：你的高傲来源于实力而非虚荣。你从不背后算计人。",strengths:["战意昂扬","桀骜不驯","直来直去","可靠战友","永不言败"],weaknesses:["脾气火爆","容易树敌","过于好斗"],method:"你用战意掩盖内心的柔软。你看起来永远斗志昂扬，但在某些安静的瞬间，你会流露出不为人知的温柔。",vibe:["🔥 战意","🦅 桀骜","⚔️ 烈焰","💥 不屈"]},
AZIK:{name:"死亡导师",code:"AZIK",char:"阿兹克·艾格斯",icon:"🕯️",quote:"「我在时光中寻找答案。」",desc:"你温和而沧桑，带着一种超越年龄的沉稳与通透。你喜欢引导和帮助他人，像一位耐心的师长。你看似平凡，实则拥有丰富而深刻的内心世界。",strengths:["温和耐心","阅历丰富","可靠稳重","善于引导","包容"],weaknesses:["过于怀旧","时而消沉","容易过度付出"],method:"你用温和来掩盖内心的疲惫。你总是笑着说「没事」，但那双眼睛里藏着太多故事。",vibe:["🕯️ 温厚","⌛ 沧桑","🌿 引导","💝 可靠"]},
POET:{name:"诗人",code:"POET",char:"伦纳德·米切尔",icon:"🌊",quote:"「黑夜给了我黑色的眼睛，我却用它寻找——呃，我的诗去哪了？」",desc:"你自由不羁，感性而浪漫。你依赖直觉和情感来理解世界，做事凭感觉、凭心情，最讨厌被束缚。你的世界里色彩比逻辑多，感觉比道理重。",strengths:["富有才华","感性浪漫","善良真诚","感染力强","想象力丰富"],weaknesses:["散漫随意","情绪化","缺乏规划"],method:"你用诗意来掩饰内心的不安。每次被问及心事，你都会用一句话带过——「你不觉得今天的晚霞很美吗？」",vibe:["🌊 浪漫","🎵 自由","✨ 灵感","💫 感性"]},
JUST:{name:"正义",code:"JUST",char:"奥黛丽·霍尔",icon:"🌸",quote:"「世界应该变得更好，不是吗？」",desc:"你善良、正直、富有同理心。你相信美好的事物，愿意为正义和公平付出努力。你优雅得体，待人真诚。你选择在看清楚世界的阴暗之后，依然选择善良。",strengths:["善良正直","优雅得体","同理心强","乐观向上","亲和力"],weaknesses:["有些天真","容易轻信","过于理想化"],method:"你用优雅来掩饰自己坚强的意志。你的笑容让人以为你很柔弱，但在原则问题上，你比任何人都坚定。",vibe:["🌸 正义","🕊️ 优雅","💗 善良","🌟 光明"]},
HANG:{name:"倒吊人",code:"HANG",char:"阿尔杰·威尔逊",icon:"⛵",quote:"「在沉默中等待，在等待中攀登。」",desc:"你务实而坚韧，有着清晰的目标和不动声色的野心。你愿意从底层做起，忍受常人无法忍受的寂寞和艰苦，只为了有朝一日能抵达高处。",strengths:["坚韧不拔","务实可靠","目标明确","隐忍克制","执行力强"],weaknesses:["过于功利","不够洒脱","容易钻牛角尖"],method:"你用低调来掩饰自己的野心。你从不谈论自己的计划——因为真正重要的事情，应该在做成之后再说。",vibe:["⛵ 隐忍","🏔️ 攀登","🎯 目标","💪 坚韧"]},
WISE:{name:"智慧之眼",code:"WISE",char:"艾辛格·斯坦顿",icon:"🔍",quote:"「知识的尽头是什么？我也想知道。」",desc:"你求知若渴，对世界充满永不停歇的好奇心。你最大的快乐来源于那些「啊哈！」的瞬间——当碎片拼合、真相浮现、规律显现的时候。",strengths:["博学多识","思维敏锐","好奇心强","理性分析","观察力"],weaknesses:["过度理性","有时钻牛角尖","缺乏行动力"],method:"你用学术语言来掩饰自己的偏执。你总是说「从理论上来说」，但所有人都知道——一旦你认定了某个研究方向，九头牛都拉不回来。",vibe:["🔍 博学","🧠 敏锐","📚 探索","⚗️ 理性"]},
MOON:{name:"月亮",code:"MOON",char:"埃姆林·怀特",icon:"🩸",quote:"「我可是高贵的血族！——咳，虽然你说得……也不是完全没道理。」",desc:"你是一个典型的傲娇——表面高傲、嘴硬、在乎身份和体面，但内心深处其实渴望被认可和接纳。你容易上头、容易被说服、容易真香。",strengths:["傲娇可爱","族群意识强","固执坚定","优雅讲究","内心善良"],weaknesses:["嘴硬心软","容易上头","过于在意外界评价"],method:"你总是摆出一副「我早就知道了」的表情。明明被说服了还要补一句「哼，算你有道理」——这是你最后的倔强。",vibe:["🩸 傲娇","🌙 优雅","🦇 血族","🎭 真香"]},
DOOR:{name:"门",code:"DOOR",char:"佛尔思·沃尔",icon:"🚪",quote:"「能明天做的事，为什么要今天做？」",desc:"你是一个彻头彻尾的拖延症患者——但不是因为懒，而是因为你有一套自己的节奏。你渴望自由，讨厌被束缚和规定，只想在自己的世界里随心所欲。",strengths:["才华横溢","向往自由","随遇而安","独特视角","关键时候靠谱"],weaknesses:["拖延症晚期","怕麻烦","缺乏主动性"],method:"你用「我在思考」来掩饰你在发呆。你总是拖到最后一刻才开始做事——但神奇的是，每次都能刚好完成。",vibe:["🚪 自由","☁️ 随性","📝 才华","😴 拖延"]},

};

{q:"在社交场合中，你通常是？",opts:[{text:"就是它了。",type:"ERRO"},{text:"就是它了。",type:"JUST"},{text:"就是它了。",type:"REDA",weight:-1},{text:"就是它了。",type:"EVEN"}]},
{q:"你最认同哪句话？",opts:[{text:"就是它了。",type:"WISE"},{text:"就是它了。",type:"AZIK"},{text:"就是它了。",type:"TYRN"},{text:"就是它了。",type:"POET"}]},

let answers={},currentQ=0;
function startQuiz(){document.getElementById('startScreen').style.display='none';document.getElementById('quizScreen').style.display='block';document.getElementById('resultScreen').style.display='none';answers={};currentQ=0;renderQuestion(0);}
function renderQuestion(i){if(i>=QUESTIONS.length)return showResult();currentQ=i;const q=QUESTIONS[i];document.getElementById('progressText').textContent=`${i+1}/${QUESTIONS.length}`;document.getElementById('progressFill').style.width=`${i/QUESTIONS.length*100}%`;document.getElementById('qTag').textContent='· 天命 ·';document.getElementById('qText').textContent=q.q;const c=document.getElementById('optionsContainer');c.innerHTML='';const lbl=['A','B','C','D'];q.opts.forEach((o,j)=>{const b=document.createElement('button');b.className='option fade-in';b.style.animationDelay=`${j*0.06}s`;b.textContent=o.text;b.onclick=()=>selectOption(j);c.appendChild(b);});document.getElementById('panel').scrollIntoView({behavior:'smooth',block:'start'});}
function selectOption(i){const btns=document.querySelectorAll('#optionsContainer .option');btns.forEach(el=>el.classList.remove('selected'));btns[i].classList.add('selected');answers[currentQ]=i;setTimeout(()=>renderQuestion(currentQ+1),300);}

function computeScores(){const s={};Object.keys(TYPES).forEach(k=>s[k]=0);Object.entries(answers).forEach(([qIdx,optIdx])=>{const q=QUESTIONS[parseInt(qIdx)];if(!q)return;const o=q.opts[optIdx];if(o&&s[o.type]!==undefined)s[o.type]+=(o.weight||1);});return s;}

function showResult(){const scores=computeScores(),typeKeys=Object.keys(TYPES);let topType=typeKeys[0],topScore=scores[typeKeys[0]];const maxScore=Math.max(...typeKeys.map(k=>scores[k]));const tied=typeKeys.filter(k=>scores[k]===maxScore);if(tied.length>=2){topType=tied[Math.floor(Math.random()*tied.length)];}else{topType=tied[0];}
const t=TYPES[topType];
document.getElementById('quizScreen').style.display='none';document.getElementById('resultScreen').style.display='block';document.getElementById('progressFill').style.width='100%';document.getElementById('rIcon').textContent=t.icon;document.getElementById('rName').textContent=t.name;document.getElementById('rCode').textContent=t.code;document.getElementById('rChar').textContent=`对应人物 · ${t.char}`;document.getElementById('rQuote').textContent=t.quote;document.getElementById('rDesc').textContent=t.desc;document.getElementById('rMethod').textContent=t.method;
document.getElementById('rStrengths').innerHTML=t.strengths.map(s=>`✦ ${s}`).join('<br>');document.getElementById('rWeaknesses').innerHTML=t.weaknesses.map(w=>`△ ${w}`).join('<br>');
const v=document.getElementById('rVibes');v.innerHTML='';t.vibe.forEach(v=>{const tag=document.createElement('span');tag.className='tag';tag.textContent=v;v.appendChild(tag);});
const rank=typeKeys.map(k=>({key:k,name:TYPES[k].name,code:TYPES[k].code,score:scores[k],icon:TYPES[k].icon})).sort((a,b)=>b.score-a.score);
const posCounts={};typeKeys.forEach(k=>posCounts[k]=0);QUESTIONS.forEach(q=>q.opts.forEach(o=>{if((o.weight||1)>0)posCounts[o.type]=(posCounts[o.type]||0)+1;}));
const rw=document.getElementById('rankingWrap');rw.innerHTML='<div class="chart-title">▎完整排名</div>';rank.forEach((r,i)=>{const isTop=r.key===topType;const maxP=posCounts[r.key]||1;const pct=maxP>0?(r.score/maxP)*100:0;const bc=isTop?'gold':r.score>0?'gray':'gray';const d=document.createElement('div');d.className='rank-item';d.innerHTML=`<span class="rank-pos">${r.icon}</span><span class="rank-name" style="color:${isTop?'var(--gold)':'var(--cream)'};opacity:${isTop?1:.6};">${r.name}</span><span class="rank-code" style="font-size:10px;color:var(--gold-dim);min-width:32px;">${r.code}</span><div class="rank-bar-wrap"><div class="rank-bar ${bc}" style="width:${Math.abs(pct)}%;"></div></div><span class="rank-score">${r.score}</span>`;rw.appendChild(d);});
drawRadar(scores);}

function drawRadar(scores){const canvas=document.getElementById('radarChart'),ctx=canvas.getContext('2d');const dpr=window.devicePixelRatio||1,dw=500,dh=500;canvas.width=dw*dpr;canvas.height=dh*dpr;canvas.style.width=dw+'px';canvas.style.height=dh+'px';ctx.scale(dpr,dpr);const cx=dw/2,cy=dh/2,r=Math.min(cx,cy)-55;const typeKeys=Object.keys(TYPES),n=typeKeys.length,as=2*Math.PI/n;function gp(i,ra){const a=i*as-Math.PI/2;return{x:cx+ra*Math.cos(a),y:cy+ra*Math.sin(a)};}
ctx.clearRect(0,0,dw,dh);const posCounts={};typeKeys.forEach(k=>posCounts[k]=0);QUESTIONS.forEach(q=>q.opts.forEach(o=>{if((o.weight||1)>0)posCounts[o.type]=(posCounts[o.type]||0)+1;}));const radarMax=Math.max(...typeKeys.map(k=>posCounts[k]),1);
[.25,.5,.75,1].forEach(p=>{const rr=r*p;ctx.beginPath();for(let i=0;i<=n;i++){const p=gp(i%n,rr);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);}ctx.closePath();ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1;ctx.stroke();});
for(let i=0;i<n;i++){const p=gp(i,r);ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(p.x,p.y);ctx.strokeStyle='rgba(255,255,255,.06)';ctx.stroke();}
ctx.textAlign='center';ctx.textBaseline='middle';const lr=r+20;typeKeys.forEach((k,i)=>{const p=gp(i,lr);ctx.fillStyle='rgba(232,220,200,.5)';ctx.font='9px "Noto Serif SC",serif';ctx.fillText(TYPES[k].code,p.x,p.y);});
ctx.beginPath();typeKeys.forEach((k,i)=>{const v=Math.max(0,scores[k]||0);const d=v/radarMax*r;const p=gp(i,d);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});ctx.closePath();const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);g.addColorStop(0,'rgba(192,132,252,.25)');g.addColorStop(.5,'rgba(184,156,224,.12)');g.addColorStop(1,'rgba(184,156,224,.02)');ctx.fillStyle=g;ctx.fill();ctx.strokeStyle='rgba(184,156,224,.5)';ctx.lineWidth=1.5;ctx.stroke();
typeKeys.forEach((k,i)=>{const v=Math.max(0,scores[k]||0);const d=v/radarMax*r;const p=gp(i,d);ctx.beginPath();ctx.arc(p.x,p.y,3,0,2*Math.PI);ctx.fillStyle=v>=posCounts[k]?'rgba(184,156,224,.9)':'rgba(192,132,252,.7)';ctx.fill();});ctx.beginPath();ctx.arc(cx,cy,2,0,2*Math.PI);ctx.fillStyle='rgba(232,220,200,.3)';ctx.fill();}
