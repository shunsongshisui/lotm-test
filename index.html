<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOM · 诡秘之主 · 人格谱系测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');

        :root {
            --bg: #080c16;
            --card: #0f1729;
            --border: #1c2844;
            --gold: #c9953c;
            --gold-dim: #8a6b30;
            --teal: #2dd4bf;
            --teal-dim: #1a8a7a;
            --cream: #e8dcc8;
            --glow-gold: rgba(201,149,60,0.12);
            --glow-teal: rgba(45,212,191,0.1);
        }

        body {
            background: var(--bg);
            color: var(--cream);
            font-family: 'Noto Serif SC', 'SimSun', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(201,149,60,0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(45,212,191,0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(10,20,60,0.3) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container { position: relative; z-index: 1; width: 100%; max-width: 720px; padding: 20px; }

        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 36px;
            box-shadow: 0 8px 50px rgba(0,0,0,0.7), inset 0 0 60px rgba(201,149,60,0.02);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            min-height: 420px;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--teal), transparent);
            opacity: 0.3;
        }

        /* --- Start Screen --- */
        .start-screen { text-align: center; padding: 20px 0; }
        .start-screen .deck-icon { font-size: 44px; display: block; margin-bottom: 10px; }
        .start-screen .logo {
            font-size: 48px; font-weight: 900; letter-spacing: 6px;
            background: linear-gradient(180deg, var(--cream) 0%, var(--gold) 50%, var(--teal) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; line-height: 1.2;
        }
        .start-screen .logo-sub { font-size: 13px; letter-spacing: 4px; color: var(--gold-dim); margin-top: 4px; font-weight: 400; }
        .start-screen .subtitle { margin-top: 22px; font-size: 16px; color: var(--cream); opacity: 0.75; line-height: 1.8; }
        .start-screen .tarot-line { margin-top: 18px; font-size: 13px; color: var(--teal-dim); letter-spacing: 2px; opacity: 0.6; }

        .btn {
            display: inline-block; padding: 14px 48px;
            border: 1px solid var(--gold); background: transparent;
            color: var(--gold); font-family: inherit; font-size: 16px;
            letter-spacing: 3px; cursor: pointer; border-radius: 4px;
            transition: all 0.3s; margin-top: 24px;
        }
        .btn:hover { background: var(--gold); color: var(--bg); box-shadow: 0 0 30px var(--glow-gold); }
        .btn:active { transform: scale(0.97); }
        .btn-sm { padding: 10px 28px; font-size: 13px; margin: 4px; }
        .btn-teal { border-color: var(--teal); color: var(--teal); }
        .btn-teal:hover { background: var(--teal); color: var(--bg); box-shadow: 0 0 30px var(--glow-teal); }

        /* --- Quiz Screen --- */
        .quiz-screen { display: none; }

        .progress-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
        .progress-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--gold), var(--teal)); transition: width 0.5s ease; border-radius: 2px; }
        .progress-text { font-size: 13px; color: var(--gold-dim); white-space: nowrap; min-width: 48px; text-align: right; }

        .q-tag { font-size: 12px; color: var(--teal-dim); letter-spacing: 2px; margin-bottom: 6px; }
        .q-text { font-size: 19px; font-weight: 700; line-height: 1.6; margin-bottom: 24px; min-height: 2.4em; }

        .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .option {
            display: block; width: 100%; padding: 14px 20px;
            border: 1px solid var(--border); border-radius: 8px;
            background: rgba(255,255,255,0.015);
            color: var(--cream); font-family: inherit; font-size: 15px;
            text-align: left; cursor: pointer;
            transition: all 0.25s; line-height: 1.5;
        }
        .option:hover { border-color: var(--gold); background: rgba(201,149,60,0.06); transform: translateX(4px); }
        .option:active { transform: scale(0.99); }
        .option .opt-label { display: inline-block; width: 24px; color: var(--gold-dim); font-weight: 700; }

        .option.selected {
            border-color: var(--teal);
            background: rgba(45,212,191,0.08);
            box-shadow: 0 0 20px rgba(45,212,191,0.05);
        }
        .option.selected .opt-label { color: var(--teal); }

        /* --- Result Screen --- */
        .result-screen { display: none; }
        .result-header { text-align: center; margin-bottom: 24px; }
        .result-badge {
            display: inline-block; font-size: 11px; letter-spacing: 2px;
            padding: 4px 14px; border: 1px solid var(--gold-dim); border-radius: 12px;
            color: var(--gold-dim); margin-bottom: 8px;
        }
        .result-char-icon { font-size: 48px; display: block; margin-bottom: 6px; }
        .result-name { font-size: 32px; font-weight: 900; line-height: 1.3; }
        .result-name .highlight { color: var(--gold); }
        .result-code { font-size: 15px; color: var(--teal); letter-spacing: 4px; margin-top: 4px; }
        .result-char { font-size: 14px; color: var(--gold-dim); margin-top: 4px; }
        .result-quote {
            margin: 16px auto 0; max-width: 480px;
            font-size: 16px; font-style: italic; color: var(--teal);
            opacity: 0.8; line-height: 1.6; padding: 12px 20px;
            border-left: 2px solid var(--teal-dim); text-align: left;
        }

        .result-desc {
            font-size: 14px; line-height: 1.9; color: var(--cream); opacity: 0.8;
            margin: 20px 0; padding: 0 4px;
        }

        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 20px 0; }
        .info-card {
            border: 1px solid var(--border); border-radius: 10px;
            padding: 16px; background: rgba(255,255,255,0.01);
        }
        .info-card .card-label { font-size: 11px; color: var(--gold-dim); letter-spacing: 2px; margin-bottom: 6px; }
        .info-card .card-body { font-size: 13px; line-height: 1.7; color: var(--cream); opacity: 0.8; }
        .info-card .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
        .info-card .tag {
            font-size: 11px; padding: 3px 10px;
            border: 1px solid var(--border); border-radius: 10px;
            color: var(--teal); letter-spacing: 1px;
        }

        .method-card {
            border: 1px solid var(--border); border-radius: 10px;
            padding: 16px 20px; background: rgba(201,149,60,0.03);
            margin: 16px 0;
        }
        .method-card .card-label { font-size: 11px; color: var(--gold-dim); letter-spacing: 2px; margin-bottom: 6px; }
        .method-card .card-body { font-size: 14px; line-height: 1.7; color: var(--cream); opacity: 0.8; font-style: italic; }

        /* Radar Chart */
        .chart-wrap { margin: 24px 0 16px; text-align: center; }
        .chart-wrap canvas { max-width: 100%; }
        .chart-title { font-size: 12px; color: var(--gold-dim); letter-spacing: 3px; margin-bottom: 12px; }

        /* Ranking */
        .ranking-wrap { margin: 16px 0; }
        .rank-item {
            display: flex; align-items: center; gap: 10px;
            padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .rank-pos { font-size: 11px; color: var(--gold-dim); min-width: 18px; text-align: right; }
        .rank-name { font-size: 13px; min-width: 60px; }
        .rank-bar-wrap { flex: 1; height: 8px; background: rgba(255,255,255,0.04); border-radius: 4px; overflow: hidden; }
        .rank-bar { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
        .rank-bar.gold { background: linear-gradient(90deg, var(--gold-dim), var(--gold)); }
        .rank-bar.teal { background: linear-gradient(90deg, var(--teal-dim), var(--teal)); }
        .rank-bar.gray { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08)); }
        .rank-score { font-size: 11px; color: var(--gold-dim); min-width: 20px; }

        .result-actions { text-align: center; margin-top: 28px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }

        .footer-text {
            text-align: center; font-size: 11px; color: var(--border);
            letter-spacing: 2px; margin-top: 16px;
        }
        .footer-text a { color: var(--gold-dim); text-decoration: none; }

        .fade-in { animation: fadeIn 0.4s ease both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 560px) {
            .panel { padding: 28px 16px; }
            .start-screen .logo { font-size: 32px; }
            .q-text { font-size: 17px; }
            .option { font-size: 14px; padding: 12px 16px; }
            .card-grid { grid-template-columns: 1fr; }
            .result-name { font-size: 26px; }
            .btn { padding: 12px 32px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="panel" id="panel">

                <div class="card-label">▎氛围</div>
                <div class="tag-row" id="rVibes"></div>
            </div>

            <div class="chart-wrap">
                <div class="chart-title">▎人格谱系雷达</div>
                <canvas id="radarChart" width="500" height="500"></canvas>
            </div>

            <div class="ranking-wrap" id="rankingWrap"></div>

            <div class="result-actions">
                <button class="btn btn-sm" onclick="startQuiz()">🔄 重新测试</button>
                <button class="btn btn-sm btn-teal" onclick="location.href='https://shunsongshisui.github.io/amti-test/'">← AMTI 主页</button>
            </div>
        </div>

        <div class="footer-text">献给诡秘之主 · Memories老师</div>
    </div>
</div>

// ========================================
// STATE
// ========================================
let answers = {};
let currentQ = 0;

// ========================================
// UI
// ========================================
function startQuiz() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('quizScreen').style.display = 'block';
    document.getElementById('resultScreen').style.display = 'none';
    answers = {};
    currentQ = 0;
    renderQuestion(0);
}

function renderQuestion(index) {
    if (index >= QUESTIONS.length) return showResult();

    currentQ = index;
    const q = QUESTIONS[index];
    document.getElementById('progressText').textContent = `${index + 1}/${QUESTIONS.length}`;
    document.getElementById('progressFill').style.width = `${((index) / QUESTIONS.length) * 100}%`;
    document.getElementById('qTag').textContent = `· 抉择 ${index + 1} ·`;
    document.getElementById('qText').textContent = q.q;

    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';
    const labels = ['A', 'B', 'C', 'D'];
    q.opts.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option fade-in';
        btn.style.animationDelay = `${i * 0.06}s`;
        btn.innerHTML = `<span class="opt-label">${labels[i]}</span> ${opt.text}`;
        btn.onclick = () => selectOption(i);
        btn.dataset.index = i;
        container.appendChild(btn);
    });

    document.getElementById('quizScreen').scrollTop = 0;
    window.scrollTo(0, 0);
    document.getElementById('panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function selectOption(index) {
    document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
    document.querySelectorAll('.option')[index].classList.add('selected');

    const q = QUESTIONS[currentQ];
    answers[currentQ] = q.opts[index].type;

    setTimeout(() => {
        renderQuestion(currentQ + 1);
    }, 300);
}

// ========================================
// RESULT
// ========================================
function showResult() {
    document.getElementById('quizScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('panel').scrollIntoView({ behavior: 'smooth', block: 'start' });

    // Count scores
    const scores = {};
    const typeKeys = Object.keys(TYPES);
    typeKeys.forEach(k => scores[k] = 0);
    Object.values(answers).forEach(type => { if (scores[type] !== undefined) scores[type]++; });

    // Find top type
    let topType = typeKeys[0];
    let topScore = 0;
    typeKeys.forEach(k => {
        if (scores[k] > topScore) { topScore = scores[k]; topType = k; }
    });

    const t = TYPES[topType];

    // Fill result
    document.getElementById('rIcon').textContent = t.icon;
    document.getElementById('rName').textContent = t.name;
    document.getElementById('rCode').textContent = t.code;
    document.getElementById('rChar').textContent = `对应人物 · ${t.char}`;
    document.getElementById('rQuote').textContent = t.quote;
    document.getElementById('rDesc').textContent = t.desc;
    document.getElementById('rMethod').textContent = t.method;

    document.getElementById('rStrengths').innerHTML = t.strengths.map(s => `✦ ${s}`).join('<br>');
    document.getElementById('rWeaknesses').innerHTML = t.weaknesses.map(w => `△ ${w}`).join('<br>');

    const vibeContainer = document.getElementById('rVibes');
    vibeContainer.innerHTML = '';
    t.vibe.forEach(v => {
        const tag = document.createElement('span');
        tag.className = 'tag';
        tag.textContent = v;
        vibeContainer.appendChild(tag);
    });

    // Ranking
    const ranking = typeKeys
        .map(k => ({ key: k, name: TYPES[k].name, code: TYPES[k].code, score: scores[k], icon: TYPES[k].icon }))
        .sort((a, b) => b.score - a.score);

    const rankingWrap = document.getElementById('rankingWrap');
    rankingWrap.innerHTML = '<div class="chart-title">▎完整排名</div>';
    ranking.forEach((r, i) => {
        const isTop = i === 0;
        const isSecond = i === 1;
        const pct = r.score / 4 * 100;
        const div = document.createElement('div');
        div.className = 'rank-item';
        div.innerHTML = `
            <span class="rank-pos">${r.icon}</span>
            <span class="rank-name" style="color:${isTop ? 'var(--gold)' : isSecond ? 'var(--teal)' : 'var(--cream)'}; opacity:${isTop ? 1 : 0.6};">${r.name}</span>
            <span class="rank-code" style="font-size:10px;color:var(--gold-dim);min-width:32px;">${r.code}</span>
            <div class="rank-bar-wrap"><div class="rank-bar ${isTop ? 'gold' : isSecond ? 'teal' : 'gray'}" style="width:${pct}%;"></div></div>
            <span class="rank-score">${r.score}</span>
        `;
        rankingWrap.appendChild(div);
    });

    // Radar chart
    drawRadar(scores);
}

// ========================================
// RADAR CHART — 21 轴雷达
// ========================================
function drawRadar(scores) {
    const canvas = document.getElementById('radarChart');
    const ctx = canvas.getContext('2d');

    const dpr = window.devicePixelRatio || 1;
    const displayW = 500, displayH = 500;
    canvas.width = displayW * dpr;
    canvas.height = displayH * dpr;
    canvas.style.width = displayW + 'px';
    canvas.style.height = displayH + 'px';
    ctx.scale(dpr, dpr);

    const cx = displayW / 2;
    const cy = displayH / 2;
    const r = Math.min(cx, cy) - 55;

    const typeKeys = Object.keys(TYPES);
    const n = typeKeys.length;
    const angleStep = (2 * Math.PI) / n;

    function getPoint(idx, radius) {
        const angle = idx * angleStep - Math.PI / 2;
        return { x: cx + radius * Math.cos(angle), y: cy + radius * Math.sin(angle) };
    }

    ctx.clearRect(0, 0, displayW, displayH);

    // Grid rings
    const rings = [0.25, 0.5, 0.75, 1];
    rings.forEach(pct => {
        const ringR = r * pct;
        ctx.beginPath();
        for (let i = 0; i <= n; i++) {
            const p = getPoint(i % n, ringR);
            i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
        }
        ctx.closePath();
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        ctx.stroke();
    });

    // Axis lines
    for (let i = 0; i < n; i++) {
        const p = getPoint(i, r);
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.stroke();
    }

    // Labels
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const labelR = r + 20;
    typeKeys.forEach((k, i) => {
        const p = getPoint(i, labelR);
        ctx.fillStyle = 'rgba(232,220,200,0.5)';
        ctx.font = '9px "Noto Serif SC", serif';
        ctx.fillText(TYPES[k].code, p.x, p.y);
    });

    // Data polygon
    ctx.beginPath();
    typeKeys.forEach((k, i) => {
        const val = Math.min(scores[k] || 0, 4);
        const dist = (val / 4) * r;
        const p = getPoint(i, dist);
        i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
    });
    ctx.closePath();

    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    grad.addColorStop(0, 'rgba(45,212,191,0.25)');
    grad.addColorStop(0.5, 'rgba(201,149,60,0.12)');
    grad.addColorStop(1, 'rgba(201,149,60,0.02)');
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.strokeStyle = 'rgba(201,149,60,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Data points
    typeKeys.forEach((k, i) => {
        const val = Math.min(scores[k] || 0, 4);
        const dist = (val / 4) * r;
        const p = getPoint(i, dist);
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, 2 * Math.PI);
        ctx.fillStyle = val >= 4 ? 'rgba(201,149,60,0.9)' : 'rgba(45,212,191,0.7)';
        ctx.fill();
    });

    ctx.beginPath();
    ctx.arc(cx, cy, 2, 0, 2 * Math.PI);
    ctx.fillStyle = 'rgba(232,220,200,0.3)';
    ctx.fill();
}
