<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命运之门 · AMTI & LOM 人格测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');

        :root {
            --bg: #080a12;
            --card: #0f1525;
            --border: #1c2440;
            --gold: #c9953c;
            --gold-dim: #8a6b30;
            --purple: #b89ce0;
            --purple-dim: #7a64a0;
            --cream: #e8dcc8;
            --glow-gold: rgba(201,149,60,0.06);
            --glow-purple: rgba(184,156,224,0.06);
        }

        body {
            background: var(--bg);
            color: var(--cream);
            font-family: 'Noto Serif SC', 'SimSun', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 25% 30%, rgba(201,149,60,0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 75% 70%, rgba(184,156,224,0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container { position: relative; z-index: 1; width: 100%; max-width: 720px; padding: 20px; }

        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 44px 36px;
            box-shadow: 0 8px 50px rgba(0,0,0,0.7);
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--purple), transparent);
            opacity: 0.3;
        }

        .header { text-align: center; margin-bottom: 36px; }
        .logo-main { font-size: 44px; font-weight: 900; letter-spacing: 6px; line-height: 1.2; }
        .logo-main .g { background: linear-gradient(180deg, var(--cream) 0%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .logo-main .p { background: linear-gradient(180deg, var(--cream) 0%, var(--purple) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .logo-main .sep { color: var(--border); -webkit-text-fill-color: var(--border); }
        .logo-sub { font-size: 13px; letter-spacing: 6px; color: var(--border); margin-top: 6px; font-weight: 400; }
        .desc { margin-top: 18px; font-size: 15px; color: var(--cream); opacity: 0.6; line-height: 1.8; text-align: center; }

        .card-row { display: flex; gap: 16px; margin-bottom: 24px; }
        .card {
            flex: 1; border: 1px solid var(--border); border-radius: 14px;
            padding: 28px 22px; text-align: center;
            background: rgba(255,255,255,0.01); position: relative; overflow: hidden;
            transition: all 0.35s;
        }
        .card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; opacity: 0; transition: opacity 0.35s; }
        .card:hover { transform: translateY(-3px); }
        .card:active { transform: translateY(-1px); }

        .card-gold { border-color: rgba(201,149,60,0.15); }
        .card-gold::after { background: linear-gradient(90deg, transparent, var(--gold), transparent); }
        .card-gold:hover { border-color: rgba(201,149,60,0.35); box-shadow: 0 8px 30px var(--glow-gold); }
        .card-gold:hover::after { opacity: 1; }
        .card-gold .card-title { color: var(--gold); }

        .card-purple { border-color: rgba(184,156,224,0.15); }
        .card-purple::after { background: linear-gradient(90deg, transparent, var(--purple), transparent); }
        .card-purple:hover { border-color: rgba(184,156,224,0.35); box-shadow: 0 8px 30px var(--glow-purple); }
        .card-purple:hover::after { opacity: 1; }
        .card-purple .card-title { color: var(--purple); }

        .card-icon { font-size: 36px; margin-bottom: 10px; }
        .card-title { font-size: 24px; font-weight: 700; letter-spacing: 4px; margin-bottom: 4px; }
        .card-sub { font-size: 13px; color: var(--gold-dim); letter-spacing: 2px; margin-bottom: 14px; }
        .card-purple .card-sub { color: var(--purple-dim); }

        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }
        .btn-link {
            display: block; padding: 10px 20px; border-radius: 8px;
            border: 1px solid var(--border); text-decoration: none;
            color: var(--cream); font-family: inherit; font-size: 14px;
            letter-spacing: 2px; transition: all 0.25s;
            background: rgba(255,255,255,0.01);
        }
        .btn-link:hover { background: rgba(255,255,255,0.04); border-color: var(--gold-dim); }
        .card-gold .btn-link:hover { border-color: var(--gold); color: var(--gold); }
        .card-purple .btn-link:hover { border-color: var(--purple); color: var(--purple); }
        .btn-link .small { font-size: 11px; color: var(--gold-dim); letter-spacing: 1px; }
        .card-purple .btn-link .small { color: var(--purple-dim); }

        .footer-text {
            text-align: center; font-size: 11px; color: var(--border);
            letter-spacing: 2px; margin-top: 8px;
        }

        @media (max-width: 560px) {
            .card-row { flex-direction: column; }
            .panel { padding: 28px 18px; }
            .logo-main { font-size: 32px; }
            .card { padding: 22px 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="panel">
        <div class="header">
            <div class="logo-main">
                <span class="g">AMTI</span><span class="sep"> · </span><span class="p">LOM</span>
            </div>
            <div class="logo-sub">命运之门 · 人格测试</div>
            <div class="desc">
                两套测试体系，两种窥探命运的方式。<br>
                选择你的路。
            </div>
        </div>

        <div class="card-row">
            <div class="card card-gold">
                <div class="card-icon">🧐</div>
                <div class="card-title">AMTI</div>
                <div class="card-sub">阿蒙人格测试</div>
                <div class="btn-group">
                    <a class="btn-link" href="https://shunsongshisui.github.io/amti-test/amti-main.html">
                        答题测试 <span class="small">· 18 道抉择</span>
                    </a>
                    <a class="btn-link" href="https://shunsongshisui.github.io/amti-test/amti-fate.html">
                        天命测试 <span class="small">· 18 道天意</span>
                    </a>
                </div>
            </div>

            <div class="card card-purple">
                <div class="card-icon">🃏</div>
                <div class="card-title">LOM</div>
                <div class="card-sub">诡秘之主·人格谱系</div>
                <div class="btn-group">
                    <a class="btn-link" href="main.html">
                        人格谱系 <span class="small">· 18 道抉择 + 雷达图</span>
                    </a>
                    <a class="btn-link" href="fate.html">
                        天命版 <span class="small">· 18 道天意 + 隐藏选项</span>
                    </a>
                </div>
            </div>
        </div>

        <div class="footer-text">献给诡秘之主 · Memories老师</div>
    </div>
</div>
</body>
</html>
